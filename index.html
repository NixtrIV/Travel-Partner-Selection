<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行搭子匹配测试</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <div class="hero-icon">✈️</div>
            <h1 class="title">旅行搭子匹配测试</h1>
            <p class="subtitle">10道题，看看你们是不是最合适的旅行伙伴</p>
        </div>

        <div class="card">
            <div class="feature">
                <div class="feature-icon">🧭</div>
                <div class="feature-text">
                    <h3>精准匹配</h3>
                    <p>基于旅行习惯的深度分析</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">
                    <h3>兴趣对齐</h3>
                    <p>发现你们的共同点与差异</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">🤝</div>
                <div class="feature-text">
                    <h3>和谐出行</h3>
                    <p>提前了解，旅途更愉快</p>
                </div>
            </div>
        </div>

        <div class="input-section">
            <label for="userName">你的昵称</label>
            <input type="text" id="userName" placeholder="输入你的昵称" maxlength="20">
        </div>

        <div class="button-group">
            <button id="startBtn" class="btn btn-primary">
                开始测试
            </button>
        </div>

        <div class="footer">
            <p>已有邀请链接？直接打开链接即可参与</p>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
