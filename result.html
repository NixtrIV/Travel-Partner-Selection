<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行搭子匹配测试 - 结果</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="result-section">
            <div class="result-icon" id="resultIcon">🎉</div>
            <h1 class="result-title" id="resultTitle">匹配结果</h1>
            <p class="result-desc" id="resultDesc">正在计算匹配度...</p>
        </div>

        <div class="match-score" id="matchScore">
            <div class="score-number" id="scoreNumber">0%</div>
            <div class="score-label">匹配度</div>
        </div>

        <div class="result-card" id="resultCard">
            <!-- 结果详情会通过JS动态生成 -->
        </div>

        <div class="analysis-section" id="analysisSection">
            <h3>详细分析</h3>
            <div id="analysisContent"></div>
        </div>

        <div class="button-group">
            <button id="shareResultBtn" class="btn btn-secondary">
                📤 分享结果
            </button>
            <button id="restartBtn" class="btn btn-primary">
                🔄 重新测试
            </button>
        </div>

        <div class="invitee-section" id="inviteeSection" style="display: none;">
            <p>邀请你的旅伴也来测试，看看你们的匹配度！</p>
            <button id="inviteBtn" class="btn btn-primary">
                👫 生成邀请链接
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
